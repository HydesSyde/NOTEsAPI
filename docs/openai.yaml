openapi: 3.0.3
info:
  title: NotesAPI
  description: RESTful API for managing notes
  version: 1.0.0

servers:
  - url: http://localhost:5000
    description: Local development server

paths:
  /notes:
    get:
      summary: Get all notes
      responses:
        "200":
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      summary: Create a new note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /notes/{id}:
    get:
      summary: Get a single note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "404":
          description: Note not found
    put:
      summary: Update a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "200":
          description: Note updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
    delete:
      summary: Delete a note
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Note deleted

components:
  schemas:
    Note:
      type: object
      properties:
        id:
          type: string
          example: "64a1f2c3e5b7"
        title:
          type: string
          example: "Meeting Notes"
        content:
          type: string
          example: "Discuss project milestones and deadlines."
        createdAt:
          type: string
          format: date-time
          example: "2026-05-25T14:30:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-05-25T14:35:00Z"
    NoteInput:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
      required:
        - title
        - content
